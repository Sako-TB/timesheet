<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Printable timesheet for work at EBF in Rafz — Tomorrow Biostasis GmbH." />
    <title>Timesheet · Tomorrow Biostasis GmbH</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React + Babel (inline JSX, no build step) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }

      .ts-root,
      .ts-root input,
      .ts-root button,
      .ts-root label,
      .ts-root th,
      .ts-root td {
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-feature-settings: 'ss01', 'cv11';
      }
      .font-display {
        font-family: 'Instrument Serif', Georgia, 'Times New Roman', serif;
        font-weight: 400;
      }
      .tabular {
        font-variant-numeric: tabular-nums;
      }
      .ts-root input[type='date'],
      .ts-root input[type='time'] {
        font-variant-numeric: tabular-nums;
      }

      /* Screen-only fallback: hide printable-only bits */
      .only-print {
        display: none;
      }

      @media print {
        @page {
          size: A4;
          margin: 10mm 12mm;
        }
        html,
        body {
          background: white !important;
        }
        .no-print {
          display: none !important;
        }
        .only-print {
          display: block !important;
        }
        .sheet {
          box-shadow: none !important;
          border: none !important;
          margin: 0 !important;
          max-width: 100% !important;
          width: 100% !important;
          page-break-inside: avoid;
          break-inside: avoid;
        }
        .sheet-break {
          page-break-after: always;
          break-after: page;
        }
        /* Keep text crisp but DO NOT strip intentional borders (border-b utilities) */
        .ts-root input,
        .ts-root textarea {
          background: transparent !important;
          color: #0a0a0a !important;
          -webkit-text-fill-color: #0a0a0a !important;
        }
        /* Hide browser date/time picker chrome (calendar/clock icons, spinners) */
        .ts-root input::-webkit-calendar-picker-indicator,
        .ts-root input::-webkit-inner-spin-button,
        .ts-root input::-webkit-clear-button {
          display: none !important;
          -webkit-appearance: none !important;
          appearance: none !important;
        }
        /* Hide text input placeholders on print */
        .ts-root input::placeholder {
          color: transparent !important;
          opacity: 0 !important;
        }
        /* Tighten everything for A4 single-page fit */
        .ts-root {
          max-width: 100% !important;
          padding: 0 !important;
        }
        .ts-root .print-pad {
          padding: 4mm 6mm !important;
        }
        .ts-root table {
          min-width: 0 !important;
          width: 100% !important;
        }
        .ts-root .overflow-x-auto {
          overflow: visible !important;
          margin: 0 !important;
          padding: 0 !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      const { useState } = React;

      // --- Inline SVG icons ---
      const IconPlus = ({ size = 13, strokeWidth = 2 }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
             strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
          <path d="M5 12h14" /><path d="M12 5v14" />
        </svg>
      );

      const IconX = ({ size = 14, strokeWidth = 1.5 }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
             strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
          <path d="M18 6 6 18" /><path d="m6 6 12 12" />
        </svg>
      );

      const IconPrinter = ({ size = 13, strokeWidth = 2 }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
             strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
          <polyline points="6 9 6 2 18 2 18 9" />
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
          <rect width="12" height="8" x="6" y="14" />
        </svg>
      );

      const IconUser = ({ size = 12, strokeWidth = 1.8 }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
             strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      );

      // --- Helpers ---
      const gen = () => Math.random().toString(36).slice(2, 10);

      function TimeCell({ value, onChange, leftBorder }) {
        return (
          <td className={`py-1.5 print:py-1 px-1.5 ${leftBorder ? 'border-l border-stone-200' : ''}`}>
            <input
              type="time"
              value={value}
              onChange={e => onChange(e.target.value)}
              className="bg-transparent outline-none border-none text-stone-900 w-full min-w-0 text-[13px] print:text-[11px]"
            />
          </td>
        );
      }

      // --- The printable timesheet, one per employee ---
      function TimesheetSheet(props) {
        const {
          employee, updateEmployeeName,
          period, setPeriod,
          entries, addEntry, removeEntry, updateEntry,
          entryMinutes, totalMinutes, fmtHM, decimalH, weekday,
          readOnly,
        } = props;

        return (
          <div className="sheet bg-white border border-stone-200 shadow-xl shadow-stone-900/5">
            <div className="print-pad px-6 md:px-12 py-8 md:py-10">
              {/* Header */}
              <header className="flex items-start justify-between pb-4 print:pb-2 border-b border-stone-900 gap-6">
                <div className="min-w-0">
                  <div className="text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-1.5">
                    Rafz · Switzerland
                  </div>
                  <h1 className="font-display text-[26px] md:text-[34px] print:text-[26px] leading-[1] tracking-tight text-stone-900">
                    Tomorrow Biostasis GmbH
                  </h1>
                  <p className="mt-1 text-xs md:text-sm print:text-[11px] text-stone-500 italic">
                    Time sheet for work at EBF in Rafz
                  </p>
                </div>
                <div className="text-right shrink-0">
                  <div className="text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-0.5">
                    Document
                  </div>
                  <div className="font-display text-xl md:text-2xl print:text-xl leading-none">
                    Timesheet
                  </div>
                  <div className="text-[10px] text-stone-400 mt-1 tabular uppercase tracking-widest">
                    Monthly record
                  </div>
                </div>
              </header>

              {/* Employee info */}
              <section className="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-4 mt-5 mb-5 print:mt-3 print:mb-3">
                <div>
                  <label className="block text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-0.5">
                    Employee Name
                  </label>
                  <input
                    type="text"
                    value={employee.name}
                    readOnly={readOnly}
                    onChange={e => updateEmployeeName && updateEmployeeName(e.target.value)}
                    className="w-full bg-transparent border-b border-stone-300 focus:border-stone-900 outline-none py-0.5 text-sm print:text-[13px] text-stone-900 transition-colors placeholder:text-stone-300"
                  />
                </div>
                <div>
                  <label className="block text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-0.5">
                    Period
                  </label>
                  <input
                    type="text"
                    value={period}
                    readOnly={readOnly}
                    onChange={e => setPeriod && setPeriod(e.target.value)}
                    placeholder="e.g. April 2026"
                    className="w-full bg-transparent border-b border-stone-300 focus:border-stone-900 outline-none py-0.5 text-sm print:text-[13px] text-stone-900 transition-colors placeholder:text-stone-300"
                  />
                </div>
              </section>

              {/* Entries */}
              <section>
                <table className="w-full text-sm tabular table-fixed">
                  <colgroup>
                    <col style={{ width: '25%' }} />
                    <col style={{ width: '14%' }} />
                    <col style={{ width: '14%' }} />
                    <col style={{ width: '14%' }} />
                    <col style={{ width: '14%' }} />
                    <col style={{ width: '14%' }} />
                    <col className="no-print" style={{ width: '5%' }} />
                  </colgroup>
                  <thead>
                    <tr className="text-left border-b-2 border-stone-900 text-stone-900">
                      <th rowSpan={2} className="py-1.5 pr-2 font-medium text-[10px] uppercase tracking-[0.12em] align-bottom">
                        Date
                      </th>
                      <th colSpan={2} className="py-1.5 px-1 font-medium text-[10px] uppercase tracking-[0.12em] text-center border-l border-stone-300">
                        Morning
                      </th>
                      <th colSpan={2} className="py-1.5 px-1 font-medium text-[10px] uppercase tracking-[0.12em] text-center border-l border-stone-300">
                        Afternoon
                      </th>
                      <th rowSpan={2} className="py-1.5 pl-1.5 font-medium text-[10px] uppercase tracking-[0.12em] text-right border-l border-stone-300 align-bottom">
                        Hours
                      </th>
                      <th rowSpan={2} className="no-print"></th>
                    </tr>
                    <tr className="text-left border-b border-stone-300 text-stone-500">
                      <th className="py-1 px-1.5 font-normal text-[9px] uppercase tracking-[0.12em] border-l border-stone-300">Start</th>
                      <th className="py-1 px-1.5 font-normal text-[9px] uppercase tracking-[0.12em]">End</th>
                      <th className="py-1 px-1.5 font-normal text-[9px] uppercase tracking-[0.12em] border-l border-stone-300">Start</th>
                      <th className="py-1 px-1.5 font-normal text-[9px] uppercase tracking-[0.12em]">End</th>
                    </tr>
                  </thead>
                  <tbody>
                    {entries.map(e => {
                      const mins = entryMinutes(e);
                      const wd = weekday(e.date);
                      return (
                        <tr key={e.id} className="border-b border-stone-200 hover:bg-stone-50/60 group transition-colors">
                          <td className="py-1.5 print:py-1 pr-2">
                            <div className="flex items-baseline gap-1.5">
                              <input
                                type="date"
                                value={e.date}
                                readOnly={readOnly}
                                onChange={ev => updateEntry && updateEntry(e.id, 'date', ev.target.value)}
                                className="bg-transparent outline-none text-stone-900 border-none text-[13px] print:text-[11px] min-w-0 w-full max-w-[120px]"
                              />
                              {wd && (
                                <span className="text-[9px] uppercase tracking-[0.12em] text-stone-400 shrink-0">
                                  {wd}
                                </span>
                              )}
                            </div>
                          </td>
                          <TimeCell value={e.ms} onChange={v => updateEntry && updateEntry(e.id, 'ms', v)} leftBorder />
                          <TimeCell value={e.me} onChange={v => updateEntry && updateEntry(e.id, 'me', v)} />
                          <TimeCell value={e.as} onChange={v => updateEntry && updateEntry(e.id, 'as', v)} leftBorder />
                          <TimeCell value={e.ae} onChange={v => updateEntry && updateEntry(e.id, 'ae', v)} />
                          <td className="py-1.5 print:py-1 pl-1.5 text-right border-l border-stone-200 text-stone-900 font-medium tabular text-[13px] print:text-[11px]">
                            {fmtHM(mins)}
                          </td>
                          <td className="no-print text-right">
                            <button
                              onClick={() => removeEntry && removeEntry(e.id)}
                              className="opacity-30 group-hover:opacity-100 text-stone-400 hover:text-red-600 transition p-1"
                              title="Remove day"
                            >
                              <IconX />
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr className="border-t-2 border-stone-900">
                      <td colSpan={5} className="py-2 print:py-1.5 pr-2 text-right text-[11px] uppercase tracking-[0.15em] text-stone-900 font-medium">
                        Total Hours
                      </td>
                      <td className="py-2 print:py-1.5 pl-1.5 text-right border-l border-stone-300 font-semibold text-stone-900 tabular text-[14px] print:text-[13px]">
                        {fmtHM(totalMinutes)}
                      </td>
                      <td className="no-print"></td>
                    </tr>
                  </tfoot>
                </table>
              </section>

              {/* Declaration */}
              <section className="mt-5 pt-3 print:mt-3 print:pt-2 border-t border-stone-200">
                <p className="text-[11px] print:text-[10px] leading-snug text-stone-600 max-w-2xl">
                  I hereby confirm that the hours recorded above accurately reflect the
                  time I worked at EBF in Rafz during the period stated. Times are
                  recorded in 24-hour format (HH:MM). Lunch and other unpaid breaks are
                  excluded from the total.
                </p>
              </section>

              {/* Signatures */}
              <section className="grid grid-cols-2 gap-10 mt-5 print:mt-4">
                <div>
                  <div className="text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-1.5">
                    Employee Signature
                  </div>
                  <div className="h-20 print:h-14 border-b border-stone-400"></div>
                  <div className="mt-2 flex items-baseline gap-3">
                    <span className="text-[10px] uppercase tracking-[0.25em] text-stone-500 shrink-0">Date</span>
                    <div className="flex-1 max-w-[160px] border-b border-stone-300 h-4"></div>
                  </div>
                  <div className="mt-2 text-[10px] uppercase tracking-[0.25em] text-stone-400">
                    {employee.name || 'Name'}
                  </div>
                </div>

                <div>
                  <div className="text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-1.5">
                    Supervisor Signature
                  </div>
                  <div className="h-20 print:h-14 border-b border-stone-400"></div>
                  <div className="mt-2 flex items-baseline gap-3">
                    <span className="text-[10px] uppercase tracking-[0.25em] text-stone-500 shrink-0">Date</span>
                    <div className="flex-1 max-w-[160px] border-b border-stone-300 h-4"></div>
                  </div>
                  <div className="mt-2 text-[10px] uppercase tracking-[0.25em] text-stone-400">
                    Name
                  </div>
                </div>
              </section>

              {/* Footer */}
              <footer className="mt-6 print:mt-4 pt-2 border-t border-stone-200 flex items-center justify-between text-[9px] uppercase tracking-[0.25em] text-stone-400">
                <span>Tomorrow Biostasis GmbH</span>
                <span className="tabular">Page 1 / 1</span>
              </footer>
            </div>
          </div>
        );
      }

      // --- Main App ---
      function App() {
        const [employees, setEmployees] = useState([{ id: gen(), name: '' }]);
        const [period, setPeriod] = useState('');
        const [entries, setEntries] = useState([createEntry()]);

        function createEntry() {
          return { id: gen(), date: '', ms: '', me: '', as: '', ae: '' };
        }

        // --- Time calculations ---
        const parseTime = t => {
          if (!t || !t.includes(':')) return null;
          const [h, m] = t.split(':').map(Number);
          if (isNaN(h) || isNaN(m)) return null;
          return h * 60 + m;
        };

        const entryMinutes = e => {
          const ms = parseTime(e.ms);
          const me = parseTime(e.me);
          const as = parseTime(e.as);
          const ae = parseTime(e.ae);
          let total = 0;
          if (ms !== null && me !== null && me > ms) total += me - ms;
          if (as !== null && ae !== null && ae > as) total += ae - as;
          return total;
        };

        const fmtHM = mins => {
          if (!mins) return '—';
          const h = Math.floor(mins / 60);
          const m = mins % 60;
          return `${h}:${m.toString().padStart(2, '0')}`;
        };

        const decimalH = mins => (mins / 60).toFixed(2);

        const weekday = dateStr => {
          if (!dateStr) return '';
          const d = new Date(dateStr);
          if (isNaN(d)) return '';
          return d.toLocaleDateString('en-GB', { weekday: 'short' });
        };

        const totalMinutes = entries.reduce((s, e) => s + entryMinutes(e), 0);

        // --- Entry ops ---
        const addEntry = () => setEntries(prev => [...prev, createEntry()]);
        const removeEntry = id => {
          setEntries(prev => prev.length === 1 ? [createEntry()] : prev.filter(e => e.id !== id));
        };
        const updateEntry = (id, field, val) => {
          setEntries(prev => prev.map(e => (e.id === id ? { ...e, [field]: val } : e)));
        };

        // --- Employee ops ---
        const addEmployee = () => setEmployees(prev => [...prev, { id: gen(), name: '' }]);
        const removeEmployee = id => {
          setEmployees(prev => prev.length === 1 ? [{ id: gen(), name: '' }] : prev.filter(e => e.id !== id));
        };
        const updateEmployee = (id, name) => {
          setEmployees(prev => prev.map(e => (e.id === id ? { ...e, name } : e)));
        };

        const multi = employees.length > 1;

        return (
          <div className="min-h-screen w-full bg-stone-100 print:bg-white">
            <div className="ts-root max-w-4xl mx-auto px-4 py-6 md:py-10 text-stone-900">
              {/* Top controls */}
              <div className="no-print flex flex-wrap items-center justify-between gap-3 mb-4">
                <div className="text-[10px] uppercase tracking-[0.25em] text-stone-500">
                  Timesheet · Tomorrow Biostasis
                </div>
                <div className="flex gap-2">
                  <button
                    onClick={addEntry}
                    className="inline-flex items-center gap-1.5 px-3 py-1.5 text-[11px] uppercase tracking-[0.15em] border border-stone-900 text-stone-900 hover:bg-stone-900 hover:text-white transition-colors"
                  >
                    <IconPlus /> Add day
                  </button>
                  <button
                    onClick={() => window.print()}
                    className="inline-flex items-center gap-1.5 px-3 py-1.5 text-[11px] uppercase tracking-[0.15em] bg-stone-900 text-white hover:bg-black transition-colors"
                  >
                    <IconPrinter /> Print / Save PDF
                  </button>
                </div>
              </div>

              {/* Employees management panel - screen only */}
              <div className="no-print bg-white border border-stone-200 p-5 mb-5">
                <div className="flex items-center justify-between mb-3">
                  <div className="flex items-center gap-2 text-[10px] uppercase tracking-[0.25em] text-stone-500">
                    <IconUser /> Employees
                  </div>
                  <div className="text-[10px] uppercase tracking-[0.25em] text-stone-400 tabular">
                    {employees.length} sheet{employees.length !== 1 ? 's' : ''} · same times
                  </div>
                </div>
                <div className="space-y-2">
                  {employees.map((emp, i) => (
                    <div key={emp.id} className="flex items-center gap-3">
                      <span className="text-stone-400 text-[11px] tabular w-5 text-right">{i + 1}</span>
                      <input
                        type="text"
                        value={emp.name}
                        onChange={e => updateEmployee(emp.id, e.target.value)}
                        placeholder={`Employee ${i + 1} name`}
                        className="flex-1 bg-transparent border-b border-stone-300 focus:border-stone-900 outline-none py-1 text-sm text-stone-900 placeholder:text-stone-300"
                      />
                      <button
                        onClick={() => removeEmployee(emp.id)}
                        className="text-stone-400 hover:text-red-600 p-1 transition"
                        title="Remove employee"
                      >
                        <IconX />
                      </button>
                    </div>
                  ))}
                </div>
                <button
                  onClick={addEmployee}
                  className="mt-3 inline-flex items-center gap-1.5 text-[11px] uppercase tracking-[0.15em] text-stone-600 hover:text-stone-900"
                >
                  <IconPlus size={11} /> Add another employee
                </button>
                {multi && (
                  <p className="mt-3 text-[11px] text-stone-500 leading-relaxed">
                    On print, one A4 page will be generated per employee, each with the
                    same dates and times entered below.
                  </p>
                )}
              </div>

              {/* Sheets: first is the editable preview, rest are print-only */}
              {employees.map((emp, idx) => {
                const isLast = idx === employees.length - 1;
                const isFirst = idx === 0;
                return (
                  <div
                    key={emp.id}
                    className={`${isFirst ? '' : 'hidden only-print'} ${!isLast ? 'sheet-break' : ''} ${isFirst ? '' : 'mt-0'}`}
                  >
                    <TimesheetSheet
                      employee={emp}
                      updateEmployeeName={name => updateEmployee(emp.id, name)}
                      period={period}
                      setPeriod={setPeriod}
                      entries={entries}
                      addEntry={addEntry}
                      removeEntry={removeEntry}
                      updateEntry={updateEntry}
                      entryMinutes={entryMinutes}
                      totalMinutes={totalMinutes}
                      fmtHM={fmtHM}
                      decimalH={decimalH}
                      weekday={weekday}
                      readOnly={!isFirst}
                    />
                  </div>
                );
              })}

              {/* Helper hint */}
              <div className="no-print mt-6 text-center text-[11px] text-stone-400 leading-relaxed">
                {multi
                  ? `${employees.length} A4 pages will be printed — one per employee. Signatures are done by hand on each printed page.`
                  : 'Fill in the fields, then print — signatures are done by hand on the printed page.'}
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
